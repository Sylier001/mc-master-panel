<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MC AFK Bot Master Control</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2e; color: #cdd6f4; padding: 20px; }
    h1 { color: #89b4fa; margin-bottom: 20px; }
    .control-box { background: #181825; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #313244; }
    .control-box h3 { margin-bottom: 10px; color: #a6e3a1; }
    input[type="text"] { padding: 10px; border-radius: 5px; border: 1px solid #45475a; background: #313244; color: #fff; width: 70%; margin-right: 10px; }
    button { padding: 10px 15px; border-radius: 5px; border: none; background: #89b4fa; color: #11111b; font-weight: bold; cursor: pointer; }
    button:hover { background: #b4befe; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
    .card { background: #313244; padding: 15px; border-radius: 8px; border-left: 5px solid #a6e3a1; transition: transform 0.2s; }
    .card.offline { border-left-color: #f38ba8; opacity: 0.7; }
    .card h3 { margin-bottom: 8px; color: #f5e0dc; }
    .card p { font-size: 14px; margin-bottom: 5px; }
    .card input { width: 100%; margin-top: 10px; margin-bottom: 5px; }
    .card button { width: 100%; }
  </style>
</head>
<body>

  <h1>🎮 Minecraft Bot Master Control</h1>

  <div class="control-box">
    <h3>Toplu Komut Gönder (Tüm Botlar)</h3>
    <input type="text" id="globalCmd" placeholder="Örn: /login 123456 veya /afk">
    <button onclick="sendGlobalCommand()">Tümüne Gönder</button>
  </div>

  <h2>Botlar (<span id="botCount">0</span>)</h2>
  <div class="grid" id="botGrid"></div>

  <script>
    const socket = io();

    socket.on('bot_list_update', (bots) => {
      document.getElementById('botCount').innerText = bots.length;
      const grid = document.getElementById('botGrid');
      grid.innerHTML = '';

      bots.forEach(bot => {
        const card = document.createElement('div');
        card.className = `card ${bot.online ? '' : 'offline'}`;
        card.innerHTML = `
          <h3>${bot.username}</h3>
          <p>Durum: <strong>${bot.online ? '🟢 Oyunda' : '🔴 Çevrimdışı'}</strong></p>
          <p>Can: ${bot.health} / 20</p>
          <p>Açlık: ${bot.food} / 20</p>
          <input type="text" id="cmd-${bot.username}" placeholder="Özel komut...">
          <button onclick="sendSingleCommand('${bot.username}')">Gönder</button>
        `;
        grid.appendChild(card);
      });
    });

    function sendSingleCommand(username) {
      const input = document.getElementById(`cmd-${username}`);
      if (input.value) {
        socket.emit('send_command', { botId: username, command: input.value });
        input.value = '';
      }
    }

    function sendGlobalCommand() {
      const input = document.getElementById('globalCmd');
      if (input.value) {
        socket.emit('send_command', { botId: 'ALL', command: input.value });
        input.value = '';
      }
    }
  </script>
</body>
</html>
